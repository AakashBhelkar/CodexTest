version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 1d
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/confirmly
      SHOPIFY_WEBHOOK_SECRET: your_shopify_webhook_secret
      AWS_REGION: us-east-1
      SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123456789012/return-risk-queue
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker:start
    environment:
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      JWT_EXPIRES_IN: 1d
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/confirmly
      SHOPIFY_WEBHOOK_SECRET: your_shopify_webhook_secret
      AWS_REGION: us-east-1
      SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123456789012/return-risk-queue
    depends_on:
      - postgres
      - redis

  analyzer:
    build:
      context: ./python_service
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4.1-mini

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: confirmly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
